name: check-for-release
run-name: Checking if there is a new hadoop release
on:
#  push:
#    branches:
#      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  actions: write
  contents: read
jobs:
  check-for-new-release:
    runs-on: ubuntu-latest
    steps:
      - name: Find new Hadoop release tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          baseline="rel/release-3.5.0"
          baseline_ver="${baseline#rel/release-}"

          hadoop_tags=$(git ls-remote --refs --tags https://github.com/apache/hadoop.git "rel/release-*" | awk '{print $2}' | sed 's#refs/tags/##')
          local_tags=$(git ls-remote --refs --tags "https://github.com/${{ github.repository }}.git" "rel/release-*" | awk '{print $2}' | sed 's#refs/tags/##')

          new_tags=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_ver="${tag#rel/release-}"

            if [ "$(printf '%s\n%s\n' "$baseline_ver" "$tag_ver" | sort -V | tail -n 1)" != "$tag_ver" ]; then
              continue
            fi

            if [ "$tag_ver" = "$baseline_ver" ]; then
              continue
            fi

            if printf '%s\n' "$local_tags" | grep -Fxq "$tag"; then
              continue
            fi

            new_tags+="$tag "$'\n'
          done <<< "$hadoop_tags"

          if [ -z "$new_tags" ]; then
            echo "No new rel/release-* tags found above ${baseline}."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sorted_tags=$(printf '%s' "$new_tags" | sed '/^$/d' | sort -V)
          latest_tag=$(printf '%s\n' "$sorted_tags" | tail -n 1)

          {
            echo "has_new=true"
            echo "latest_tag=$latest_tag"
            echo "tags<<EOF"
            printf '%s\n' "$sorted_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "New tags to build:"
          printf '%s\n' "$sorted_tags"

      - name: Dispatch build pipeline for each new tag
        if: steps.tags.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_SCOPED_TOKEN != '' && secrets.REPO_SCOPED_TOKEN || secrets.GITHUB_TOKEN }}
          DISPATCH_REF: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            mark_latest=false
            if [ "$tag" = "${{ steps.tags.outputs.latest_tag }}" ]; then
              mark_latest=true
            fi

            echo "Dispatching build-native-libs.yml for ${tag} (mark_latest=${mark_latest})"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/workflows/build-native-libs.yml/dispatches" \
              -f ref="$DISPATCH_REF" \
              -f "inputs[hadoop_ref]=$tag" \
              -f "inputs[mark_latest]=$mark_latest"
          done <<< "${{ steps.tags.outputs.tags }}"
