name: build-native-win-hadoop-libs
run-name: Binaries for hadoop release ${{ inputs.hadoop_ref }}
on:
  workflow_dispatch:
    inputs:
      hadoop_ref:
        description: "Hadoop tag or branch to build (e.g. rel/release-3.4.1)"
        required: true
        type: string
      mark_latest:
        description: "Set release as latest"
        required: false
        default: "false"
        type: string
jobs:
  build-native-libs:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - run: git config --system core.longpaths true
      - uses: actions/checkout@v6
        with:
          repository: apache/hadoop
          ref: ${{ inputs.hadoop_ref }}
      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
          restore-keys: ${{ runner.os }}-m2
      - name: Inject compat shim for GetFileInformationByName
        shell: pwsh
        run: |
          # Newer Windows SDK declares GetFileInformationByName in fileapi.h,
          # while Hadoop winutils also declares one with a different signature.
          # Include windows.h first, then rename only Hadoop's symbol.
          $shim = "$env:GITHUB_WORKSPACE\hadoop_win_compat.h"
          Set-Content -LiteralPath $shim -Encoding ascii -Value @'
          #pragma once
          #include <windows.h>
          #define GetFileInformationByName Hadoop_GetFileInformationByName
          '@

          Set-Content -LiteralPath "$env:GITHUB_WORKSPACE\Directory.Build.props" -Encoding ascii -Value @"
          <Project>
            <ItemDefinitionGroup Condition="'`$(MSBuildProjectName)'=='libwinutils' Or '`$(MSBuildProjectName)'=='winutils'">
              <ClCompile>
                <ForcedIncludeFiles>$shim;%(ForcedIncludeFiles)</ForcedIncludeFiles>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          "@
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Run native build
        run: "mvn package '-Pnative-win' -DskipTests '-Dmaven.javadoc.skip=true' -pl ':hadoop-common,:hadoop-maven-plugins'"
        continue-on-error: false
      - name: Package release data
        run: |
          cd "$env:GITHUB_WORKSPACE\hadoop-common-project\hadoop-common\target"
          Compress-Archive -Path .\bin -DestinationPath "$env:GITHUB_WORKSPACE\hadoop-win-utils.zip"
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ github.repository }}
          tag_name: ${{ inputs.hadoop_ref }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.hadoop_ref }}
          body: "Binaries for hadoop version ${{ inputs.hadoop_ref }}"
          prerelease: ${{ !startsWith(inputs.hadoop_ref, 'rel/') }}
          make_latest: ${{ startsWith(inputs.hadoop_ref, 'rel/') && inputs.mark_latest == 'true' && 'true' || 'false' }}
          files: ${{ github.workspace }}\hadoop-win-utils.zip
      - name: Create blocking tag on failure
        if: failure() && startsWith(inputs.hadoop_ref, 'rel/release-')
        env:
          GH_TOKEN: ${{ secrets.REPO_SCOPED_TOKEN != '' && secrets.REPO_SCOPED_TOKEN || secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $repo = "${{ github.repository }}"
          $tag = "${{ inputs.hadoop_ref }}"

          try {
            gh api "/repos/$repo/git/ref/tags/$tag" | Out-Null
            Write-Host "Blocking tag already exists: $tag"
          }
          catch {
            if ($_.Exception.Message -match "404") {
              gh api --method POST "/repos/$repo/git/refs" -f ref="refs/tags/$tag" -f sha="${{ github.sha }}"
              Write-Host "Created blocking tag: $tag"
            }
            else {
              throw
            }
          }
      - name: Create issue on failure
        if: failure() && startsWith(inputs.hadoop_ref, 'rel/release-')
        env:
          GH_TOKEN: ${{ secrets.REPO_SCOPED_TOKEN != '' && secrets.REPO_SCOPED_TOKEN || secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $repo = "${{ github.repository }}"
          $tag = "${{ inputs.hadoop_ref }}"
          $title = "Binary build failed for $tag"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $body = @"
          The automated build failed for `$tag`.

          - Workflow run: $runUrl
          - Workflow: `${{ github.workflow }}`
          - Attempt: `${{ github.run_attempt }}`

          This tag has been created in this repository to block automatic retries by the checker workflow.
          Re-run this workflow manually for `$tag` after fixing the underlying issue.
          "@

          $issuesJson = gh issue list --repo $repo --state open --search "$title in:title" --json number,title
          $issues = $issuesJson | ConvertFrom-Json
          $existing = $issues | Where-Object { $_.title -eq $title } | Select-Object -First 1

          if ($null -ne $existing) {
            Write-Host "Issue already open: #$($existing.number)"
          }
          else {
            gh issue create --repo $repo --title $title --body $body | Out-Null
            Write-Host "Created failure issue for $tag"
          }
