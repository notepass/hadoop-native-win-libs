name: build-native-win-hadoop-libs
run-name: Binaries for hadoop release ${{ inputs.hadoop_ref }}
on:
  workflow_dispatch:
    inputs:
      hadoop_ref:
        description: "Hadoop tag or branch to build (e.g. rel/release-3.4.1)"
        required: true
        type: string
jobs:
  build-native-libs:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - run: git config --system core.longpaths true
      - uses: actions/checkout@v6
        with:
          repository: apache/hadoop
          ref: ${{ inputs.hadoop_ref }}
      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
          restore-keys: ${{ runner.os }}-m2
      - name: Inject compat shim for GetFileInformationByName
        shell: pwsh
        run: |
          # Problem: newer Windows SDK fileapi.h declares
          #   BOOL GetFileInformationByName(...)
          # Hadoop winutils.h declares its own
          #   DWORD GetFileInformationByName(...)
          # Both inside extern "C" => C2733 at compile time.
          # kernel32.lib also exports GetFileInformationByName => LNK2005 at link time.
          #
          # Fix: rename Hadoop's function to Hadoop_GetFileInformationByName
          # everywhere using a macro that is active for all source files via /FI.
          # The macro is defined BEFORE windows.h so the SDK declaration also lands
          # under the renamed symbol. The kernel32 export under the original name is
          # then never referenced and causes no conflict.
          $shim = "$env:GITHUB_WORKSPACE\hadoop_win_compat.h"
          Set-Content -Path $shim -Value @'
          #pragma once
          // Rename GetFileInformationByName throughout all Hadoop winutils source
          // files. This macro is defined before windows.h so the SDK declaration
          // in fileapi.h also lands under the renamed symbol, preventing both the
          // C2733 compiler conflict and the LNK2005 linker conflict with kernel32.
          #define GetFileInformationByName Hadoop_GetFileInformationByName
          #include <windows.h>
          '@

          # MSBuild auto-imports Directory.Build.props from any ancestor of the
          # .vcxproj. Placing it at the workspace root covers all Hadoop projects.
          Set-Content -Path "$env:GITHUB_WORKSPACE\Directory.Build.props" -Value @"
          <Project>
            <ItemDefinitionGroup>
              <ClCompile>
                <ForcedIncludeFiles>$shim;%(ForcedIncludeFiles)</ForcedIncludeFiles>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          "@
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Pre debug output
        run: |
          msbuild /version
          mvn -v
          gci env:* | sort-object name
          echo "Ref name: $env:GITHUB_REF_NAME"
          echo "Repo: $env:GITHUB_REPOSITORY"
          echo "Workspace dir: $env:GITHUB_WORKSPACE"
      - run: "pwd"
      - name: Run native build
        run: "mvn package '-Pnative-win' -DskipTests '-Dmaven.javadoc.skip=true' -pl ':hadoop-common,:hadoop-maven-plugins'"
        continue-on-error: false
      - name: Package release data
        run: |
          cd "$env:GITHUB_WORKSPACE\hadoop-common-project\hadoop-common\target"
          Compress-Archive -Path .\bin -DestinationPath "$env:GITHUB_WORKSPACE\hadoop-win-utils.zip"
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.hadoop_ref }}
          name: ${{ inputs.hadoop_ref }}
          body: "Windows native binaries for Apache Hadoop ${{ inputs.hadoop_ref }}"
          prerelease: ${{ !startsWith(inputs.hadoop_ref, 'rel/') }}
          make_latest: ${{ startsWith(inputs.hadoop_ref, 'rel/') && 'true' || 'false' }}
          files: ${{ github.workspace }}\hadoop-win-utils.zip
          token: ${{ secrets.RELEASE_SECRET }}
